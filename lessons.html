    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

    <!-- 登录守卫：未登录立即跳登录页 -->
    <script>
      (function () {
        try {
          if (!JSON.parse(localStorage.getItem('afe.user') || 'null')) {
            window.location.replace('login.html');
          }
        } catch (e) {
          window.location.replace('login.html');
        }
      })();
    </script>

  <body>
    <div class="page">
      <header class="navbar solid">
